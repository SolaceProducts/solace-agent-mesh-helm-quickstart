# Sample values file for standalone SAM agent deployment
# This deploys an agent WITHOUT the agent-deployer microservice
#
# IMPORTANT: You must also provide an agent configuration file using:
#   helm install my-agent solace-agent-mesh/sam-agent \
#     -f agent-standalone-values.yaml \
#     --set-file config.yaml=/path/to/your-agent-config.yaml

# Agent identifier (required) - must be unique per agent instance
id: "my-custom-agent"

# Global configuration
global:
  imageRegistry: gcr.io/gcp-maas-prod   # SAM image registry (override for an internal mirror)
  persistence:
    namespaceId: "solace-agent-mesh"    # Used for database/bucket naming conventions

# Solace Broker Configuration (required)
solaceBroker:
  url: "wss://your-broker-url:443"  # e.g., wss://mr2zq0g0f1.messaging.solace.cloud:443
  username: "your-broker-username"
  password: "your-broker-password"
  vpn: "your-vpn-name"
  useTemporaryQueues: true

# LLM Service Configuration (required)
llmService:
  generalModelName: "gpt-4o"  # or your preferred model
  endpoint: "https://api.openai.com/v1"
  apiKey: "your-openai-api-key"

# Persistence: choose ONE of the two options below.
#
# Option 1 (recommended for production): reference existing Kubernetes secrets
#   that you've created out-of-band. Each secret must contain the keys the chart
#   expects (see inline comments).
#
# Option 2: provide credentials inline and let the chart materialize the secrets.
#   Set `createSecrets: true` and fill in the database/s3/azure/gcs blocks.

# --- Option 1: reference existing secrets (chart default: createSecrets: false) ---
persistence:
  existingSecrets:
    database: "<your-database-secret>"  # must contain DATABASE_URL, PGHOST, PGUSER, PGPASSWORD
    s3: "<your-s3-secret>"              # must contain S3_ENDPOINT_URL, S3_BUCKET_NAME, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    # azure: "<your-azure-secret>"      # alternative to s3: AZURE_STORAGE_ACCOUNT_NAME, AZURE_STORAGE_ACCOUNT_KEY (or AZURE_STORAGE_CONNECTION_STRING), AZURE_STORAGE_CONTAINER_NAME
    # gcs:   "<your-gcs-secret>"        # alternative to s3: GCS_BUCKET_NAME, GCS_PROJECT, GCS_CREDENTIALS_JSON

# --- Option 2: inline credentials (uncomment, then remove or empty Option 1) ---
# persistence:
#   createSecrets: true
#   database:
#     url: "postgresql+psycopg2://user:password@host:5432/dbname"
#     # OR provide individual components (used only if `url` is empty):
#     # protocol: "postgresql+psycopg2"
#     # host: "your-postgres-host"
#     # port: "5432"
#     # username: "your-db-user"
#     # password: "your-db-password"
#     # database: "your-db-name"
#   s3:
#     endpointUrl: "https://s3.amazonaws.com"
#     bucketName: "your-bucket-name"
#     accessKey: "your-access-key"
#     secretKey: "your-secret-key"
#     region: "us-east-1"

# Service Account
serviceAccount:
  name: solace-agent-mesh-sa

# Image Pull Secrets: choose ONE of the two options below
#
# Option A — let the chart manage the pull secret
#   helm install ... --set-file global.imagePullKey=/path/to/sam-pull-credentials.json
#   When using this option, comment out the imagePullSecrets block.
#
# Option B — pre-create the Secret yourself and reference it here. Useful when
# multiple agent releases in the same namespace should share one pre-existing secret:
#   kubectl create secret generic <my-secret-name> -n <ns> --type=kubernetes.io/dockerconfigjson \
#     --from-file=.dockerconfigjson=/path/to/credentials.json
imagePullSecrets:
  - "<my-secret-name>"   # Remove when using Option A

image:
  repository: solace-agent-mesh-enterprise
  tag: "1.500.0"                        # bump to match your SAM control plane version
  pullPolicy: IfNotPresent

# Deployment Strategy
rollout:
  rollingUpdate: {}
  strategy: Recreate  # Use Recreate to avoid multiple instances

# Resource Limits
resources:
  sam:
    requests:
      cpu: 1000m
      memory: 1024Mi
    limits:
      cpu: 2000m
      memory: 2048Mi

# Additional environment variables (optional)
environmentVariables: {}
  # CUSTOM_VAR: "custom_value"

# Service Configuration (optional)
service:
  type: LoadBalancer
  port: 5001
  annotations: {}
  dns:
    enabled: false
    hostname: ""
    ttl: "300"

# Pod Configuration (optional)
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
annotations: {}
podAnnotations: {}
podLabels: {}

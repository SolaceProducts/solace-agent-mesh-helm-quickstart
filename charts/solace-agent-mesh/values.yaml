# Solace Agent Mesh (SAM) Helm Chart Configuration
#
# This file works out of the box for a quick start deployment (helm install sam solace-agent-mesh/solace-agent-mesh).
# Defaults deploy SAM with an embedded broker, bundled persistence, and localhost port-forward access in a default namespace.
#
# For production environments, consider:
#   - Using an external broker (set global.broker.embedded: false and configure a cloud or self-managed Solace event broker)
#   - Using external persistence (set global.persistence.enabled: false and configure external datastores)
#   - Setting a unique global.persistence.namespaceId for database/user scoping
#   - Enabling OIDC authentication (set sam.authorization.enabled: true and configure oauthProvider and authenticationRbac)
#   - Exposing via Ingress instead of port-forward (set ingress.enabled: true)
#   - Setting external URLs for frontend and platform services (and clear the localhost defaults)
# 
# For air-gapped environments, consider:
#   - Setting global.imageRegistry to your internal registry (e.g., "registry.internal.example.com") to redirect all images
#   - Providing imagePullSecrets for your private registry (global.imagePullSecrets)

# =============================================================================
# GLOBAL
# =============================================================================
global:
  # Deploy a single-node Solace event broker alongside SAM
  # For production: set to false and configure the BROKER section below
  broker:
    embedded: true

  # Deploy bundled persistence with in-cluster PostgreSQL and SeaweedFS
  # For production: set to false and configure the PERSISTENCE section below
  persistence:
    enabled: true
    # Use a unique identifier for SAM database/user scoping
    # For production: set it to a unique value per SAM installation to avoid topic collisions
    namespaceId: "solace-agent-mesh"

  # Configure the image registry
  # For air-gapped environments: set to your internal registry
  # For per-image overrides: set image.registry on individual components below to redirect a single image
  imageRegistry: gcr.io/gcp-maas-prod

  # Apply image pull secrets to ALL pods (core, agent-deployer, postgresql, seaweedfs, broker)
  # Note: Required when using a private registry (including the default gcr.io/gcp-maas-prod)
  # One entry covers all components unless there are per-component imagePullSecrets overrides below
  imagePullSecrets: []

  # Configure pull-credentials for private registries. When set, the chart creates a
  # kubernetes.io/dockerconfigjson Secret and injects it into all pod specs.
  #
  # Expects the K8s Secret data shape: `{ ".dockerconfigjson": "<base64>" }`
  # Use: --set-file global.imagePullKey=sam-pull-credentials.json
  # Note: Mutually exclusive with global.imagePullSecrets.
  imagePullKey: ""

# =============================================================================
# VALIDATIONS
# =============================================================================
# Template-time cluster resource existence checks.
# Each referenced Secret, ConfigMap, StorageClass, and IngressClass is looked up
# in the cluster before install to surface missing resources immediately instead
# of letting pods fail with ImagePullBackOff or PVCs get stuck Pending.
#
# Requires 'get' RBAC on each referenced resource (not 'list' on all resources).
# Set to false if your service account lacks 'get' on cluster resources.
validations:
  clusterResourceChecks: true

# =============================================================================
# CORE SAM CONFIGURATION
# =============================================================================
sam:
  # Disable SAM enterprise features (Internal)
  # Default: false (enterprise features enabled)
  communityMode: false

  # ---------------------------------------------------------------------------
  # Port-Forward Access
  # ---------------------------------------------------------------------------
  # Localhost defaults sized for `kubectl port-forward 8000:80`. Behavior in
  # other modes:
  # - ingress.enabled=true: ignored. The chart derives URLs from sam.dnsName
  #   (preferred, can carry a port) or ingress.host.
  # - ingress.enabled=false with sam.dnsName set (NodePort, LoadBalancer):
  #   these defaults still win unless cleared. Set both to "" alongside
  #   sam.dnsName so the dnsName-derived URL is used.
  frontendServerUrl: "http://localhost:8000"
  platformServiceUrl: "http://localhost:8080"

  # Apply a CORS regex pattern for allowed origins
  # Default: allows any localhost:port
  # For production: set to ""
  cors:
    allowedOriginRegex: "https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?"

  # ---------------------------------------------------------------------------
  # Authorization and Authentication
  # ---------------------------------------------------------------------------
  # Enforce RBAC authorization via OIDC
  # Default: false - all users have admin access
  # For production: set to true and configure oauthProvider/authenticationRbac sections below
  authorization:
    enabled: false

  # External hostname operators reach SAM at. Drives the host portion of all
  # emitted URLs (FRONTEND_SERVER_URL, OIDC_REDIRECT_URI, EXTERNAL_AUTH_*) and
  # takes precedence over ingress.host for URL composition. Include the port
  # if SAM is exposed on a non-standard port (kind hostPort, NodePort) — the
  # K8s Ingress rule's host: field is port-less by spec and cannot carry it.
  # Leave empty for port-forward or for ingress on standard ports (chart
  # derives the host from ingress.host in that case).
  dnsName: "" # e.g., sam.example.com or sam.local:8080

  # Secure user sessions with session secret key
  # Default: empty (Note: auto-generates on first install, stable across upgrades)
  # For production: set explicitly for reproducibility (recommended)
  sessionSecretKey: "" # e.g., openssl rand -hex 32

  # Configure OIDC provider
  # Set when authorization.enabled is true
  oauthProvider:
    oidc:
      issuer: ""       # e.g., https://login.microsoftonline.com/YOUR-TENANT-ID/v2.0
      clientId: ""     # e.g., your-client-id
      clientSecret: "" # e.g., your-client-secret

  # Configure RBAC role assignments
  # Default: no custom roles, static user assignments for admin and standard user, no IDP claim mappings
  # For production: configure customRoles, static user assignments and/or dynamic IDP claim mapping as needed
  authenticationRbac:
    # Custom role definitions with fine-grained scopes
    customRoles: {}
      # viewer:
      #   description: "Read-only access to agents, deployments and connectors"
      #   scopes:
      #     - "artifact:read"
      #     - "sam:agent_builder:read"
      #     - "sam:deployments:read"
      #     - "sam:connectors:read"

    # Static user assignments
    users:
      - identity: "admin@example.com" # Can be email, username, name, etc.
        roles: ["sam_admin"]
        description: "SAM Administrator Account"
      - identity: "user1@example.com"
        roles: ["sam_user"]
        description: "Standard SAM User"

    # Dynamic role assignment from IDP claims
    idpClaims:
      enabled: false
      oidcProvider: "oidc"
      claimKey: "groups" # e.g., "groups", "roles", "custom_claim"
      mappings: {}
        # "admin-group": ["sam_admin"]
        # "user-group": ["sam_user"]

    # Default roles assigned when no explicit role match is found
    defaultRoles:
      - "sam_user"

  # ---------------------------------------------------------------------------
  # Task Logging
  # ---------------------------------------------------------------------------
  # Configure SAM logging during task execution
  # Default: enabled with status updates and file parts logged
  taskLogging:
    enabled: true
    logStatusUpdates: true
    logArtifactEvents: false
    logFileParts: true
    maxFilePartSizeBytes: 10240
    hybridBuffer:
      enabled: true
      flushThreshold: 10

  # ---------------------------------------------------------------------------
  # Feature Enablement
  # ---------------------------------------------------------------------------
  # Toggle SAM UI features (all enabled by default)
  featureEnablement:
    awsBedrockEnabled: true
    backgroundTasks: true
    binaryArtifactPreview: true

# =============================================================================
# BROKER
# =============================================================================
# Configure an external Solace Event Broker
# For production: set global.broker.embedded above to false and configure your external broker here
broker:
  url: ""            # e.g., tcps://mr2zq0g0f1.messaging.solace.cloud:55443 or wss://...:443
  clientUsername: "" # e.g., your broker username
  password: ""       # e.g., your broker password (or use extraSecretEnvironmentVars below)
  vpn: ""            # e.g., your broker VPN name

# =============================================================================
# LLM SERVICE (Optional)
# =============================================================================
# Configure LLM here or via the SAM UI after installation
llmService: {}
  # llmServiceEndpoint: ""  # e.g., "https://api.openai.com/v1"
  # llmServiceApiKey: ""    # e.g., your API key (or use extraSecretEnvironmentVars below)
  # planningModel: ""       # e.g., "gpt-4o"
  # generalModel: ""        # e.g., "gpt-4o"
  # reportModel: ""         # e.g., "gpt-4o" (optional)
  # imageModel: ""          # e.g., "dall-e-3" (optional)
  # transcriptionModel: ""  # e.g., "whisper-1" (optional)

# =============================================================================
# ENVIRONMENT VARIABLES (Optional)
# =============================================================================

# Load credentials from existing Kubernetes Secrets instead of setting them inline above
extraSecretEnvironmentVars: []
  # - envName: LLM_SERVICE_API_KEY
  #   secretName: my-existing-secret
  #   secretKey: LLM_SERVICE_API_KEY
  # - envName: SOLACE_BROKER_PASSWORD
  #   secretName: my-existing-secret
  #   secretKey: SOLACE_BROKER_PASSWORD

# Inject custom environment variables into SAM core containers
# Note: Variables configured through other sections should not be duplicated here
environmentVariables:
  # Bypass any HTTP proxy for in-cluster traffic (broker, postgres, seaweedfs)
  NO_PROXY: ".svc,.svc.cluster.local,.cluster.local,localhost,127.0.0.1,sam-seaweedfs"

  # Feature flags (SAM_FEATURE_<KEY>=true|false)
  # Flags default to the value in features.yaml; env vars override at runtime.
  SAM_FEATURE_PROJECT_SHARING: "true"
  SAM_FEATURE_PROJECT_INDEXING: "true"

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# ---------------------------------------------------------------------------
# K8S Service
# ---------------------------------------------------------------------------
# Expose SAM within the cluster
# For production: keep ClusterIP when using Ingress, or set to LoadBalancer or NodePort
service:
  type: ClusterIP
  # Service annotations (e.g., cloud-specific load balancer config)
  annotations: {}
    # AWS: service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # GCP: cloud.google.com/load-balancer-type: "Internal"

  # NodePort configuration (set only if type is NodePort)
  nodePorts:
    http: ""           # 30000-32767 (WebUI HTTP)
    https: ""          # 30000-32767 (WebUI HTTPS)
    auth: ""           # 30000-32767 (Auth Service)
    platformHttp: ""   # 30000-32767 (Platform API HTTP)
    platformHttps: ""  # 30000-32767 (Platform API HTTPS)

  # TLS/SSL for LoadBalancer/NodePort (pod-level TLS termination)
  # Note: not needed for Ingress (TLS terminates at the ingress level)
  tls:
    enabled: false
    # Reference an existing kubernetes.io/tls secret
    existingSecret: ""
    # Note: Optionally, provide inline: --set-file service.tls.cert=/path/to/tls.crt --set-file service.tls.key=/path/to/tls.key
    cert: ""
    key: ""
    passphrase: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
# Configure HTTP/HTTPS routing with TLS termination
# For production: enable when using Ingress and configure for ingress controller
# Note: When enabled and sam.dnsName is empty, URLs auto-compute from ingress.host. Set sam.dnsName above to override (required for non-standard ports).
ingress:
  enabled: false
  className: ""  # e.g., "nginx", "alb", "traefik", "gce"

  # Ingress annotations (vary by controller)
  annotations: {}
    # NGINX:
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    #
    # AWS ALB (also set sam.dnsName — ALB requires it for URL computation):
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account:certificate/id
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/subnets: subnet-xxxxx,subnet-yyyyy
    # alb.ingress.kubernetes.io/healthcheck-path: /health
    # alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig":{"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    # external-dns.alpha.kubernetes.io/hostname: sam.example.com

  # Automatic path configuration (recommended)
  # Generates all required ingress paths: platform API, auth endpoints, and WebUI
  autoConfigurePaths: true

  # Hostname for the ingress
  # Note: Leave empty for ALB (accepts all hostnames). Set to your domain for NGINX or other name-based controllers
  host: ""  # e.g., sam.example.com

  # Manual hosts/paths configuration (only used when autoConfigurePaths: false)
  hosts: []
    # - host: "sam.example.com"
    #   paths:
    #     - path: /api/v1/platform
    #       pathType: Prefix
    #       portName: platform
    #     - path: /login
    #       pathType: Prefix
    #       portName: auth
    #     - path: /
    #       pathType: Prefix
    #       portName: webui

  # TLS configuration for ingress
  # Note: entries here trigger HTTPS URL generation (required for OIDC redirects)
  tls: []
    # - secretName: sam-tls
    #   hosts:
    #     - sam.example.com

# =============================================================================
# PERSISTENCE (external datastores)
# =============================================================================
# Configure external datastores: PostgreSQL database and object storage
# For production: set global.persistence.enabled to false above and configure datastores here
dataStores:
  database:
    protocol: "postgresql+psycopg2"
    host: ""                   # e.g., mydb.cluster-xxxx.us-east-1.rds.amazonaws.com
    port: "5432"
    adminUsername: ""          # PostgreSQL admin user (used to create SAM application users)
    adminPassword: ""          # PostgreSQL admin password
    applicationPassword: ""    # Shared password for all SAM database users (webui, orchestrator, platform, agents)
    supabaseTenantId: ""       # Supabase-specific: qualifies usernames for connection pooler

  # Object storage type: "s3", "azure", or "gcs"
  objectStorage:
    type: "s3"
    workloadIdentity:
      enabled: false  # Enable for cloud-native auth (AWS IRSA, Azure WI, GCP WI) instead of access keys

  # S3-compatible storage (AWS S3, MinIO, etc.)
  s3:
    endpointUrl: ""               # Leave empty for AWS S3; set for MinIO or other S3-compatible stores
    bucketName: ""                # S3 bucket for artifact storage
    connectorSpecBucketName: ""   # S3 bucket for connector specs (can be same as bucketName)
    evalDataBucketName: ""        # Optional S3 bucket for eval execution data & artifact snapshots. Defaults to bucketName when empty.
    accessKey: ""
    secretKey: ""
    region: "us-east-1"           # AWS S3 only (e.g. us-east-1, eu-west-1)

  # Azure Blob Storage (configure if objectStorage.type: "azure")
  azure:
    accountName: ""
    accountKey: ""
    connectionString: ""
    containerName: ""               # Blob container for artifact storage
    connectorSpecContainerName: ""  # Blob container for connector specs (can be same as containerName)
    evalDataContainerName: ""       # Optional Blob container for eval execution data & artifact snapshots. Defaults to containerName when empty.

  # Google Cloud Storage (configure if objectStorage.type: "gcs")
  gcs:
    project: ""
    credentialsJson: ""
    bucketName: ""                # GCS bucket for artifact storage
    connectorSpecBucketName: ""   # GCS bucket for connector specs (can be same as bucketName)
    evalDataBucketName: ""        # Optional GCS bucket for eval execution data & artifact snapshots. Defaults to bucketName when empty.

# =============================================================================
# DEPLOYMENT
# =============================================================================
samDeployment:
  # Service account for SAM pods
  # Note: auto-generates {release}-{chart}-core-sa when name is empty
  # Set explicitly for workload identity (AWS IRSA, Azure WI, GCP WI)
  serviceAccount:
    name: ""
    annotations: {}
      # AWS IRSA:
      # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/sam-s3-role
      # Azure Workload Identity:
      # azure.workload.identity/client-id: <managed-identity-client-id>
      # GCP Workload Identity:
      # iam.gke.io/gcp-service-account: sam@project.iam.gserviceaccount.com

  # Image pull secret attached to SAM service accounts (core, agent-deployer, broker)
  # Note: Using global.imagePullSecrets is preferred
  imagePullSecret: ""

  # Main SAM application container image
  image:
    registry: ""                              # Overrides global.imageRegistry for this image only
    repository: solace-agent-mesh-enterprise
    tag: "1.514.0"
    digest: ""                                # When set, takes precedence over tag (e.g. sha256:abc...)
    pullPolicy: IfNotPresent

  # Agent/Gateway Deployer — deploys and manages agents and gateways
  agentDeployer:
    image:
      registry: ""                              # Overrides global.imageRegistry for this image only
      repository: sam-agent-deployer
      tag: "1.8.2"
      digest: ""                                # When set, takes precedence over tag (e.g. sha256:abc...)
      pullPolicy: IfNotPresent
    version: "k8s-1.501.0"
    chartVersion: "1.501.0"

    # In-cluster API host for the deployer's helm client. Only applied when
    # HTTP_PROXY/HTTPS_PROXY is set, so the .svc NO_PROXY rule bypasses the proxy.
    # Set to "" if your API server cert lacks a kubernetes.default.svc SAN.
    kubeApiHost: "kubernetes.default.svc"

  # Database init container image (runs before sam-core to initialise the PostgreSQL schema)
  dbInit:
    image:
      registry: ""
      repository: postgres
      tag: "18.0-trixie"
      digest: ""
      pullPolicy: IfNotPresent

  # S3 init container image (runs before sam-core when embedded persistence is enabled)
  s3Init:
    image:
      registry: ""
      repository: chrislusf/seaweedfs
      tag: "3.97-compliant"
      digest: ""
      pullPolicy: IfNotPresent


  # Custom CA certificate injection
  # When enabled, a ca-merge init container runs before the main container. It copies the system
  # CA bundle and appends any *.crt files from the 'truststore' ConfigMap in the namespace.
  # The merged bundle is shared with all containers via the CA env vars (SSL_CERT_FILE, etc.).
  #
  # Certificate format:
  #   Certificates must be in PEM format (Base64-encoded, with -----BEGIN CERTIFICATE----- headers).
  #   For a chain (root + intermediates), concatenate all PEM blocks into a single file.
  #   If your certificates are in a different format, convert first:
  #     DER    → PEM: openssl x509 -inform der -in ca.der -out ca.crt
  #     PKCS#7 → PEM: openssl pkcs7 -print_certs -in ca.p7b -out ca.crt
  #     PKCS#12 → PEM: openssl pkcs12 -in ca.pfx -out ca.crt -nokeys -cacerts
  #
  # To enable:
  #   1. Set customCA.enabled: true and upgrade the chart
  #   2. kubectl create configmap truststore --from-file=ca.crt=/path/to/your-ca.pem -n <namespace>
  #   3. kubectl rollout restart deployment/<name>
  #
  # Override the image used for the CA merge init container (ca-merge).
  # When unset, defaults to samDeployment.image (the SAM app image).
  # Must be a Debian-based image — needs /etc/ssl/certs/ca-certificates.crt.
  # Only relevant when customCA.enabled: true.
  # Example: { repository: debian, tag: bookworm-slim }
  caInitImage: {}

  # When customCA.enabled: true, the ConfigMap named by configMapName MUST exist in the
  # release namespace at helm install/upgrade time — the chart validates this upfront and
  # fails fast if it is missing, so a typo or forgotten create step surfaces immediately
  # instead of silently falling back to the system CA bundle.
  customCA:
    enabled: false
    configMapName: truststore

  # Deployment strategy
  rollout:
    rollingUpdate: {}
    strategy: RollingUpdate

  # Security contexts
  podSecurityContext:
    runAsUser: 10001
    fsGroup: 10002
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true

  # Scheduling and labeling
  nodeSelector: {}
  tolerations: []
  annotations: {}
  podAnnotations: {}
  podLabels: {}

  # Resource requests and limits
  resources:
    sam:
      requests:
        cpu: 1000m
        memory: 1024Mi
      limits:
        cpu: 2000m
        memory: 2048Mi
    agentDeployer:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

# =============================================================================
# SAM DOCTOR PRE-FLIGHT CHECK
# =============================================================================
# Run sam-doctor before install/upgrade to validate configuration
# Default: enabled
# Note: When enabled and not available, the hook logs a warning and exits 0 (no impact)
samDoctor:
  enabled: true
  failOnError: true     # Set to false to always exit 0 even when checks fail
  timeoutSeconds: 180   # Hook job's activeDeadlineSeconds
  tlsDnsName: ""        # Defaults to sam.dnsName if not set, Set to your DNS name when using TLS with a custom domain to validate the certificate

# =============================================================================
# CONTAINER IMAGES (Bundled Components)
# =============================================================================
# These images are used by the bundled persistence layer and embedded broker
# They inherit global.imageRegistry automatically but can be overridden per component as needed (e.g., for a private registry)
# 
# Notes:
#   - imagePullSecrets overrides are merged with global.imagePullSecrets
#   - image.registry overrides global.imageRegistry for a specific image
#   - image.tag overrides the tag for a specific image, only override if your registry mirror uses different tags
#   - image.digest takes precedence over a tag when set (e.g. sha256:abc...)

# Embedded datastores (PostgreSQL and SeaweedFS) used when global.persistence.enabled is true
# For production: set global.persistence.enabled to false and configure external datastores in PERSISTENCE section above
persistence-layer:
  postgresql:
    serviceAccountName: ""
    commonLabels:
      app.kubernetes.io/service: "database"
    imagePullSecrets: []
    image:
      registry: ""
      repository: postgres
      tag: "18.0-trixie"
      digest: ""
  seaweedfs:
    serviceAccountName: ""
    commonLabels:
      app.kubernetes.io/service: "s3"
    imagePullSecrets: []
    image:
      registry: ""
      repository: chrislusf/seaweedfs
      tag: "3.97-compliant"
      digest: ""

# Embedded Solace event broker used when global.broker.embedded is true
# For production: set global.broker.embedded to false and use an external Solace broker in the BROKER section above
embeddedBroker:
  imagePullSecrets: []
  image:
    registry: ""
    repository: solace-pubsub-enterprise
    tag: "10.25.0.193-multi-arch" # TODO: update to proper tag once available
    digest: ""
  # storageClassName: ""  # Uses cluster default if not specified
  # shmSize: "1Gi"        # Shared memory size limit for /dev/shm (minimum: 1Gi)
  # resources:            # Minimum memory: 2480Mi — the broker will not start with less
  #   requests:
  #     cpu: "2"
  #     memory: 2480Mi
  #   limits:
  #     cpu: "2"
  #     memory: 2480Mi

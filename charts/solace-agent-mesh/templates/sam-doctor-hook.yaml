{{- if .Values.samDoctor.enabled }}
{{- $noFailFlag := ternary "" "--no-fail-on-error" .Values.samDoctor.failOnError }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sam.names.fullname" . }}-sam-doctor
  labels:
    {{- include "sam.labels.standard" (dict "root" . "config" (dict "component" "sam-doctor")) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.samDoctor.timeoutSeconds | int }}
  template:
    metadata:
      labels:
        {{- include "sam.labels.matchLabels" (dict "root" . "component" "sam-doctor") | nindent 8 }}
        {{- if and (eq (include "sam.objectStorage.type" .) "azure") .Values.dataStores.objectStorage.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "sam.names.serviceAccount" (dict "root" . "config" (dict "component" "sam-doctor")) }}
      securityContext:
        {{- include "sam.security.podContext" (dict "override" .Values.samDeployment.podSecurityContext) | nindent 8 }}
      {{- /* Build pull secrets for the hook pod using only pre-existing secrets.
             sam.images.pullSecrets is intentionally NOT used here — it injects
             {release}-pull-secret (created by global.imagePullKey) which is a regular
             chart resource that does not exist yet when this pre-install/pre-upgrade
             hook runs. Instead, the ephemeral sam-doctor-pull-secret hook (weight -13)
             provides image pull credentials when imagePullKey is set. */ -}}
      {{- $hookSecrets := list -}}
      {{- range .Values.global.imagePullSecrets -}}
        {{- $hookSecrets = append $hookSecrets . -}}
      {{- end -}}
      {{- if not (empty .Values.samDeployment.imagePullSecret) -}}
        {{- $hookSecrets = append $hookSecrets .Values.samDeployment.imagePullSecret -}}
      {{- end -}}
      {{- if (.Values.global.imagePullKey | default "" | trim) -}}
        {{- $hookSecrets = append $hookSecrets (printf "%s-sam-doctor-pull-secret" (include "sam.names.fullname" .)) -}}
      {{- end -}}
      {{- if $hookSecrets }}
      imagePullSecrets:
        {{- range $hookSecrets | uniq }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      volumes:
        - name: empty-dir
          emptyDir: {}
        {{- if .Values.samDeployment.customCA.enabled }}
        {{- include "sam.cacert.volume" (.Values.samDeployment.customCA.configMapName | default "truststore") | nindent 8 }}
        {{- include "sam.cacert.trustVolume" . | nindent 8 }}
        {{- end }}
      {{- if .Values.samDeployment.customCA.enabled }}
      {{- $caInitImg := ternary .Values.samDeployment.caInitImage .Values.samDeployment.image (not (empty .Values.samDeployment.caInitImage.repository)) }}
      initContainers:
        {{- include "sam.cacert.initContainerSpec" (dict "root" . "config" (dict "caInitImage" $caInitImg "customCA" .Values.samDeployment.customCA)) | nindent 8 }}
      {{- end }}
      containers:
        - name: sam-doctor
          image: {{ include "sam.images.image" (dict "root" . "image" .Values.samDeployment.image) | quote }}
          imagePullPolicy: {{ .Values.samDeployment.image.pullPolicy }}
          securityContext:
            {{- include "sam.security.containerContext" (dict "override" .Values.samDeployment.securityContext) | nindent 12 }}
          volumeMounts:
            - name: empty-dir
              mountPath: /tmp
              subPath: tmp
            {{- if .Values.samDeployment.customCA.enabled }}
            {{- include "sam.cacert.trustVolumeMount" . | nindent 12 }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              if ! python -c "import sam_doctor" 2>/dev/null; then
                echo "WARNING: sam-doctor is not installed in this image — skipping pre-flight checks."
                echo "To run checks, use an enterprise image that includes sam_doctor."
                exit 0
              fi
              if [ -n "${GCS_CREDENTIALS_JSON:-}" ]; then
                _gcs_creds_file="$(mktemp /tmp/gcs-creds-XXXXXX.json)"
                trap 'rm -f "$_gcs_creds_file"' EXIT
                printf '%s' "$GCS_CREDENTIALS_JSON" > "$_gcs_creds_file"
                export GOOGLE_APPLICATION_CREDENTIALS="$_gcs_creds_file"
              fi
              python -m sam_doctor {{ $noFailFlag }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: {{ include "sam.names.fullname" . }}-sam-doctor
          env:
            - name: SAM_DOCTOR_CONTEXT
              value: helm
            {{- $skipChecks := list }}
            {{- if .Values.global.persistence.enabled }}
              {{- $skipChecks = list "object_storage" "object_storage_authentication" "database_reachable" "database_authentication" }}
            {{- else if .Values.dataStores.objectStorage.workloadIdentity.enabled }}
              {{- $skipChecks = list "object_storage_authentication" }}
            {{- end }}
            {{- if .Values.global.broker.embedded }}
              {{- $skipChecks = append $skipChecks "broker_connectivity" }}
            {{- end }}
            {{- if $skipChecks }}
            - name: SAM_DOCTOR_SKIP_CHECKS
              value: {{ join "," $skipChecks | quote }}
            {{- end }}
            {{- if and .Values.service.tls.enabled (not .Values.service.tls.existingSecret) }}
            - name: TLS_DNS_NAME
              value: {{ .Values.samDoctor.tlsDnsName | default .Values.sam.dnsName | quote }}
            {{- end }}
            {{- if and .Values.sam.oauthProvider .Values.sam.oauthProvider.oidc .Values.sam.oauthProvider.oidc.issuer }}
            - name: AUTHENTICATION_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.samDeployment.customCA.enabled }}
            {{- include "sam.cacert.env" nil | nindent 12 }}
            {{- end }}
{{- end }}

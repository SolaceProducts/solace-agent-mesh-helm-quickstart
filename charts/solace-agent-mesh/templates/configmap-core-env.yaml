{{- $urls := include "sam.urls.compute" . | fromYaml }}
{{ include "sam.config.metadata" (dict "root" . "name" "core-env") }}
data:
  # Namespace
  NAMESPACE: {{ required "global.persistence.namespaceId is required." .Values.global.persistence.namespaceId | quote }}

  # Broker config flags
  SOLACE_DEV_MODE: "false"
  USE_TEMPORARY_QUEUES: "false"

  # LLM model names and endpoints (not secrets — API keys are in core-secrets)
  LLM_SERVICE_PLANNING_MODEL_NAME: {{ .Values.llmService.planningModel | default "" | quote }}
  LLM_SERVICE_GENERAL_MODEL_NAME: {{ .Values.llmService.generalModel | default "" | quote }}
  LLM_REPORT_MODEL_NAME: {{ .Values.llmService.reportModel | default "" | quote }}
  LLM_SERVICE_ENDPOINT: {{ .Values.llmService.llmServiceEndpoint | default "" | quote }}
  IMAGE_MODEL_NAME: {{ .Values.llmService.imageModel | default "" | quote }}
  IMAGE_DESCRIPTION_MODEL_NAME: {{ .Values.llmService.planningModel | default "" | quote }}
  IMAGE_SERVICE_ENDPOINT: {{ .Values.llmService.llmServiceEndpoint | default "" | quote }}
  AUDIO_TRANSCRIPTION_MODEL_NAME: {{ .Values.llmService.transcriptionModel | default "" | quote }}
  AUDIO_TRANSCRIPTION_API_BASE: {{ .Values.llmService.llmServiceEndpoint | default "" | quote }}

  # WebUI Gateway
  WEBUI_GATEWAY_ID: {{ printf "%s-gateway" (include "sam.names.fullname" .) | quote }}
  FASTAPI_HOST: "0.0.0.0"
  FASTAPI_PORT: "8000"
  FASTAPI_HTTPS_PORT: "8443"

  # Platform Service
  PLATFORM_API_HOST: "0.0.0.0"
  PLATFORM_API_PORT: "8001"
  PLATFORM_API_HTTPS_PORT: "4443"
  CORS_ALLOWED_ORIGIN_REGEX: {{ .Values.sam.cors.allowedOriginRegex | quote }}

  # Frontend config
  FRONTEND_WELCOME_MESSAGE: "How can I assist you today?"
  FRONTEND_BOT_NAME: "Solace Agent Mesh"
  FRONTEND_COLLECT_FEEDBACK: "false"

  # Gateway
  ENABLE_EMBED_RESOLUTION: "true"
  GATEWAY_ARTIFACT_LIMIT_BYTES: "10000000"

  # TLS paths (not sensitive — passphrase is in core-secrets)
  {{- if .Values.service.tls.enabled }}
  SSL_CERTFILE: "/app/certs/tls.crt"
  SSL_KEYFILE: "/app/certs/tls.key"
  {{- else }}
  SSL_CERTFILE: ""
  SSL_KEYFILE: ""
  {{- end }}

  # Computed URLs
  FRONTEND_SERVER_URL: {{ $urls.frontendServerUrl | quote }}
  PLATFORM_SERVICE_URL: {{ $urls.platformServiceUrl | quote }}
  WEBUI_FRONTEND_SERVER_URL: {{ $urls.externalBaseUrl | quote }}
  WEBUI_FRONTEND_URL: {{ $urls.externalBaseUrl | quote }}
  FRONTEND_REDIRECT_URL: {{ $urls.externalBaseUrl | quote }}

  {{- if not .Values.sam.communityMode }}
  # Auth config (flags, not secrets)
  SAM_AUTHORIZATION_CONFIG: "/app/config/enterprise_config.yaml"
  TRUST_MANAGER_ENABLED: "true"
  SAM_ACCESS_TOKEN_ENABLED: "true"
  EXTERNAL_AUTH_PROVIDER: "oidc"
  EXTERNAL_AUTH_HOST: {{ $urls.externalHost | quote }}
  EXTERNAL_AUTH_CALLBACK: {{ $urls.authCallbackUrl | quote }}
  EXTERNAL_AUTH_SERVICE_URL: {{ $urls.authServiceUrl | quote }}
  {{- if and .Values.sam.oauthProvider .Values.sam.oauthProvider.oidc .Values.sam.oauthProvider.oidc.issuer .Values.sam.authorization.enabled }}
  OAUTH2_ENABLED: "true"
  FRONTEND_USE_AUTHORIZATION: "true"
  {{- else }}
  OAUTH2_ENABLED: "false"
  FRONTEND_USE_AUTHORIZATION: "false"
  {{- end }}
  OAUTH2_DEV_MODE: "false"
  {{- end }}

  # Custom environment variables
  {{- range $key, $value := include "sam.utils.envAsMap" .Values.environmentVariables | fromYaml }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}

{{- if and .Values.samDoctor.enabled (.Values.global.imagePullKey | default "" | trim) -}}
{{- $cfg := .Values.global.imagePullKey | trim -}}
{{- $parsed := $cfg | fromJson -}}
{{- $b64 := get $parsed ".dockerconfigjson" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-sam-doctor-pull-secret" (include "sam.names.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sam.labels.standard" (dict "root" . "config" (dict "component" "sam-doctor")) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-13"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded,hook-failed"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $b64 }}
{{- end }}

{{- if not .Values.sam.communityMode }}
{{ include "sam.config.metadata" (dict "root" . "name" "role-definitions") }}
data:
  # For more information on RBAC role definitions and scope patterns, see:
  # https://solacelabs.github.io/solace-agent-mesh/docs/documentation/enterprise/rbac-setup-guide
  role-to-scope-definitions.yaml: |
    roles:
      sam_admin:
        description: "Full access for SAM administrators"
        scopes:
          - "*"
      sam_user:
        description: "Standard user with basic access"
        scopes:
          - "agent:*:delegate"
          - "tool:basic:read"
          - "tool:basic:search"
          - "tool:artifact:list"
          - "tool:artifact:load"
          - "project:share"
{{- if and .Values.sam.authenticationRbac .Values.sam.authenticationRbac.customRoles }}
{{- range $roleName, $roleConfig := .Values.sam.authenticationRbac.customRoles }}
      {{ $roleName }}:
        description: {{ $roleConfig.description | quote }}
        scopes:
{{- range $roleConfig.scopes }}
          - {{ . | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if not .Values.sam.communityMode }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sam.names.component" (dict "root" . "component" "agent-deployer") }}-rolebinding
  labels:
    {{- include "sam.labels.standard" (dict "root" . "config" (dict "component" "agent-deployer")) | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "sam.names.serviceAccount" (dict "root" . "config" (dict "component" "agent-deployer")) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "sam.names.component" (dict "root" . "component" "agent-deployer") }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

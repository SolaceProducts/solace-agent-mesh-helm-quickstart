{{- if and .Values.service.tls.enabled (not .Values.service.tls.existingSecret) }}
{{ include "sam.secret.metadata" (dict "root" . "name" "tls" "type" "kubernetes.io/tls") }}
data:
  tls.crt: {{ .Values.service.tls.cert | b64enc | quote }}
  tls.key: {{ .Values.service.tls.key | b64enc | quote }}
{{- end }}

{{ include "sam.secret.metadata" (dict "root" . "name" "core-secrets") }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-core-secrets" (include "sam.names.fullname" .)) }}
data:
  # Broker credentials
  {{- if (include "sam.broker.embedded" .) }}
  SOLACE_BROKER_URL: {{ printf "tcp://%s:55555" (include "sam.names.component" (dict "root" . "component" "broker")) | b64enc | quote }}
  SOLACE_BROKER_USERNAME: {{ "default" | b64enc | quote }}
  SOLACE_BROKER_PASSWORD: {{ "" | b64enc | quote }}
  SOLACE_BROKER_VPN: {{ "default" | b64enc | quote }}
  {{- if and $existingSecret (hasKey $existingSecret.data "BROKER_ADMIN_PASSWORD") }}
  BROKER_ADMIN_PASSWORD: {{ index $existingSecret.data "BROKER_ADMIN_PASSWORD" }}
  {{- else }}
  BROKER_ADMIN_PASSWORD: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- else }}
  SOLACE_BROKER_URL: {{ required "broker.url is required when global.broker.embedded is false" .Values.broker.url | b64enc | quote }}
  SOLACE_BROKER_USERNAME: {{ required "broker.clientUsername is required when global.broker.embedded is false" .Values.broker.clientUsername | b64enc | quote }}
  SOLACE_BROKER_PASSWORD: {{ required "broker.password is required when global.broker.embedded is false" .Values.broker.password | b64enc | quote }}
  SOLACE_BROKER_VPN: {{ required "broker.vpn is required when global.broker.embedded is false" .Values.broker.vpn | b64enc | quote }}
  {{- end }}

  # LLM service credentials
  LLM_SERVICE_API_KEY: {{ (.Values.llmService.llmServiceApiKey | default "") | b64enc | quote }}
  IMAGE_SERVICE_API_KEY: {{ (.Values.llmService.llmServiceApiKey | default "") | b64enc | quote }}
  AUDIO_TRANSCRIPTION_API_KEY: {{ (.Values.llmService.llmServiceApiKey | default "") | b64enc | quote }}

  # Session — auto-generate if not provided; reuse existing value on upgrades to prevent session invalidation.
  {{ $sessionSecret := .Values.sam.sessionSecretKey -}}
  {{ if not $sessionSecret -}}
    {{ if and $existingSecret (hasKey $existingSecret.data "SESSION_SECRET_KEY") -}}
      {{ $sessionSecret = index $existingSecret.data "SESSION_SECRET_KEY" | b64dec -}}
    {{ else -}}
      {{ $sessionSecret = randAlphaNum 32 -}}
    {{ end -}}
  {{ end -}}
  SESSION_SECRET_KEY: {{ $sessionSecret | b64enc | quote }}

  # TLS passphrase
  SSL_KEYFILE_PASSWORD: {{ (.Values.service.tls.passphrase | default "") | b64enc | quote }}

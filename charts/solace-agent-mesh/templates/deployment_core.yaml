{{- include "solace-agent-mesh.validations.all" . -}}
{{- $config := dict
  "component" "core"
  "replicaCount" 1
  "rollout" .Values.samDeployment.rollout
  "annotations" .Values.samDeployment.annotations
  "podAnnotations" .Values.samDeployment.podAnnotations
  "podLabels" (include "sam.core.podLabels" . | fromYaml)
  "podSecurityContext" .Values.samDeployment.podSecurityContext
  "checksums" (dict
    "config" (include (print $.Template.BasePath "/configmap-shared-config.yaml") . | sha256sum)
    "env" (include (print $.Template.BasePath "/configmap-core-env.yaml") . | sha256sum)
    "loggingConfig" (include (print $.Template.BasePath "/configmap-logging.yaml") . | sha256sum)
    "coreSecrets" (include (print $.Template.BasePath "/secret-core.yaml") . | sha256sum)
    "database" (include (print $.Template.BasePath "/secret-database.yaml") . | sha256sum)
    "storage" (include (print $.Template.BasePath "/secret-storage.yaml") . | sha256sum)
    "envOverrides" (include (print $.Template.BasePath "/secret_env_overrides.yaml") . | sha256sum)
  )
  "serviceAccount" (dict
    "name" .Values.samDeployment.serviceAccount.name
    "annotations" .Values.samDeployment.serviceAccount.annotations
  )
  "nodeSelector" .Values.samDeployment.nodeSelector
  "tolerations" .Values.samDeployment.tolerations
  "caInitImage" (ternary .Values.samDeployment.caInitImage .Values.samDeployment.image (not (empty .Values.samDeployment.caInitImage.repository)))
  "customCA" (dict "enabled" .Values.samDeployment.customCA.enabled "configMapName" .Values.samDeployment.customCA.configMapName)
  "container" (dict
    "image" .Values.samDeployment.image
    "command" (include "sam.core.command" . | fromYamlArray)
    "ports" (list
      (dict "name" "orchestrator" "containerPort" 5002)
      (dict "name" "webui-tls" "containerPort" 8443)
      (dict "name" "webui" "containerPort" 8000)
      (dict "name" "platform" "containerPort" 8001)
      (dict "name" "platform-tls" "containerPort" 4443)
      (dict "name" "auth" "containerPort" 5050)
      (dict "name" "health" "containerPort" 8088)
    )
    "env" (include "sam.core.env" . | fromYamlArray)
    "envFrom" (include "sam.core.envFrom" . | fromYamlArray)
    "securityContext" .Values.samDeployment.securityContext
    "resources" .Values.samDeployment.resources.sam
    "probes" (dict
      "startup" (dict
        "httpGet" (dict "path" "/startup" "port" 8088)
        "initialDelaySeconds" 25
        "periodSeconds" 5
        "failureThreshold" 30
      )
      "readiness" (dict
        "httpGet" (dict "path" "/readyz" "port" 8088)
        "periodSeconds" 10
        "failureThreshold" 3
      )
      "liveness" (dict
        "httpGet" (dict "path" "/healthz" "port" 8088)
        "periodSeconds" 10
        "failureThreshold" 3
      )
    )
    "volumeMounts" (list
      (dict "name" "shared-storage" "mountPath" "/tmp/solace-agent-mesh")
      (dict "name" "empty-dir" "mountPath" "/app/.sam" "subPath" "sam-cli-home")
      (dict "name" "config-volume" "mountPath" "/app/config" "readOnly" true)
      (dict "name" "tls-certs" "mountPath" "/app/certs" "readOnly" true)
      (dict "name" "logging-config-volume" "mountPath" "/app/config/logging" "readOnly" true)
    )
  )
-}}
{{- include "sam.deployment" (dict "root" . "config" $config) }}

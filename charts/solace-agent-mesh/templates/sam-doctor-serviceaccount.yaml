{{- if .Values.samDoctor.enabled }}
{{- /* Dedicated hook SA — cannot reuse the core SA because it is a regular chart
       resource that does not exist at pre-install time. IAM annotations
       (IRSA / GCP WI / Azure WI) are merged from samDeployment.serviceAccount.annotations
       so the hook pod gets the same cloud identity as the main workloads. */ -}}
{{- $config := dict
  "component" "sam-doctor"
  "serviceAccount" (dict "annotations" .Values.samDeployment.serviceAccount.annotations)
  "imagePullSecrets" (ternary (list .Values.samDeployment.imagePullSecret) nil (not (empty .Values.samDeployment.imagePullSecret)))
  "hook" true
  "hookWeight" "-10"
  "hookDeletePolicy" "before-hook-creation,hook-succeeded,hook-failed"
-}}
{{- include "sam.serviceAccount" (dict "root" . "config" $config) }}
{{- end }}

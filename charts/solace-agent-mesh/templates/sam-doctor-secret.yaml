{{- if .Values.samDoctor.enabled }}
{{ include "sam.secret.metadata" (dict "root" . "name" "sam-doctor" "component" "sam-doctor" "hook" true "hookWeight" "-15" "hookDeletePolicy" "before-hook-creation,hook-succeeded,hook-failed") }}
data:
  {{- /* --- Broker --- */}}
  SOLACE_BROKER_URL: {{ .Values.broker.url | default "" | b64enc | quote }}
  SOLACE_BROKER_USERNAME: {{ .Values.broker.clientUsername | default "" | b64enc | quote }}
  SOLACE_BROKER_PASSWORD: {{ .Values.broker.password | default "" | b64enc | quote }}
  SOLACE_BROKER_VPN: {{ .Values.broker.vpn | default "" | b64enc | quote }}
  {{- /* --- LLM --- */}}
  LLM_SERVICE_ENDPOINT: {{ .Values.llmService.llmServiceEndpoint | default "" | b64enc | quote }}
  LLM_SERVICE_API_KEY: {{ .Values.llmService.llmServiceApiKey | default "" | b64enc | quote }}
  {{- /* --- Database and object storage (external persistence only — checks skipped for bundled) --- */}}
  {{- if not .Values.global.persistence.enabled }}
  {{- include "sam.secret.databaseData" . | nindent 2 }}
  {{- include "sam.secret.storageData" . | nindent 2 }}
  {{- end }}
  {{- /* --- TLS --- */}}
  {{- if and .Values.service.tls.enabled (not .Values.service.tls.existingSecret) }}
  TLS_CERT: {{ .Values.service.tls.cert | b64enc | quote }}
  {{- end }}
  {{- /* --- OIDC --- */}}
  {{- if and .Values.sam.oauthProvider .Values.sam.oauthProvider.oidc .Values.sam.oauthProvider.oidc.issuer }}
  AUTHENTICATION_SERVER: {{ .Values.sam.oauthProvider.oidc.issuer | b64enc | quote }}
  {{- end }}
{{- end }}

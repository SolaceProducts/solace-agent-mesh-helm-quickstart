{{- include "solace-agent-mesh-agent.validations.all" . }}
{{- if not (include "sam.componentId" .) }}
{{- fail "id is required. Please provide --set id=<your-component-id> (or --set agentId=<id> for backward compatibility)" }}
{{- end }}
{{- $config := dict
  "component" .Values.component
  "replicaCount" .Values.replicaCount
  "rollout" .Values.rollout
  "annotations" .Values.annotations
  "podAnnotations" .Values.podAnnotations
  "podLabels" (include "sam.agent.podLabels" . | fromYaml)
  "podSecurityContext" .Values.podSecurityContext
  "checksums" (dict
    "config" (include (print $.Template.BasePath "/component-config.yaml") . | sha256sum)
    "secrets" (include (print $.Template.BasePath "/secrets.yaml") . | sha256sum)
    "loggingConfig" (include (print $.Template.BasePath "/logging-configmap.yaml") . | sha256sum)
  )
  "serviceAccount" .Values.serviceAccount
  "nodeSelector" .Values.nodeSelector
  "tolerations" .Values.tolerations
  "imagePullSecrets" .Values.imagePullSecrets
  "caInitImage" .Values.image
  "customCA" (dict "enabled" .Values.customCA.enabled "configMapName" .Values.customCA.configMapName)
  "container" (dict
    "image" .Values.image
    "command" (include "sam.agent.command" . | fromYamlArray)
    "env" (include "sam.agent.env" . | fromYamlArray)
    "envFrom" (include "sam.agent.envFrom" . | fromYamlArray)
    "securityContext" .Values.securityContext
    "resources" .Values.resources.sam
    "volumeMounts" (list
      (dict "name" "empty-dir" "mountPath" "/app/.sam" "subPath" "sam-cli-home")
      (dict "name" "shared-storage" "mountPath" "/tmp/solace-agent-mesh")
      (dict "name" "config-volume" "mountPath" "/app/config/agent.yaml" "subPath" "agent.yaml" "readOnly" true)
      (dict "name" "logging-config-volume" "mountPath" "/app/config/logging" "readOnly" true)
    )
  )
-}}
{{- include "sam.deployment" (dict "root" . "config" $config) }}

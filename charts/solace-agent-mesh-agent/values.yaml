replicaCount: 1

# Image pull secrets for private registries (set by agent-deployer via --set imagePullSecrets[0]=name)
imagePullSecrets: []

global:
  # Image registry for all images in this chart.
  # Default: gcr.io/gcp-maas-prod (set by parent chart when deployed via agent-deployer).
  # Override to redirect all images to an internal mirror registry.
  imageRegistry: gcr.io/gcp-maas-prod

  # Configure pull-credentials for private registries. When set, the chart creates a
  # kubernetes.io/dockerconfigjson Secret and injects it into all pod specs.
  #
  # Expects the K8s Secret data shape: `{ ".dockerconfigjson": "<base64>" }`
  # Use: --set-file global.imagePullKey=sam-pull-credentials.json
  # Note: Mutually exclusive with imagePullSecrets and global.imagePullSecrets.
  imagePullKey: ""

  persistence:
    namespaceId: "solace-agent-mesh"

# Component: "agent" (default) or "gateway"
component: "agent"

# Component type (only used when component is "gateway")
# Examples: "rest", "slack", "teams", "event_mesh"
componentType: ""

# Component identifier (required)
# Use 'id' for new deployments. 'agentId' is supported for backward compatibility.
id: ""
agentId: ""  # Deprecated: use 'id' instead

config:
  # Component configuration YAML (required)
  # Provide the configuration as a raw YAML string
  #
  # When deployed via agent-deployer: provided automatically
  # When deploying this chart directly: provide via --set-file config.yaml=/path/to/config.yaml
  #
  # 'agentYaml' is supported for backward compatibility
  yaml: ""
  agentYaml: ""  # Deprecated: use 'yaml' instead
serviceAccount:
  name: ""
  create: true
  annotations: {}
    # AWS IRSA:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/sam-s3-role
    # Azure Workload Identity:
    # azure.workload.identity/client-id: <managed-identity-client-id>
    # GCP Workload Identity:
    # iam.gke.io/gcp-service-account: sam@project.iam.gserviceaccount.com

image:
  registry: ""                        # overrides global.imageRegistry for this image only
  repository: solace-agent-mesh-enterprise
  tag: "latest"
  digest: ""                          # when set, takes precedence over tag
  pullPolicy: IfNotPresent

# Init container image for database initialisation (db-init)
# Runs on every pod start to create the application user/schema.
# registry defaults to global.imageRegistry if not set.
# Set by agent-deployer from the main chart's samDeployment.dbInit.image values.
dbInit:
  image:
    registry: ""
    repository: postgres
    tag: "18.0-trixie"
    digest: ""
    pullPolicy: IfNotPresent

# Custom CA certificate injection
# When enabled, a ca-merge init container merges the system CA bundle with any *.crt files
# from the 'truststore' ConfigMap in the namespace. All containers receive the merged bundle
# via CA env vars (SSL_CERT_FILE, REQUESTS_CA_BUNDLE, PGSSLROOTCERT, TRUST_STORE).
#
# Enabled by the agent-deployer via --set customCA.enabled=true when the main chart has it on.
customCA:
  enabled: false
  configMapName: truststore

rollout:
  rollingUpdate: {}
  strategy: Recreate

podSecurityContext:
securityContext:
nodeSelector: {}
tolerations: []
annotations: {}
podAnnotations: {}
podLabels: {}

files: []

# Solace Broker Configuration
solaceBroker:
  url: "ws://localhost:8080"
  username: "default"
  password: "default"
  vpn: "default"
  useTemporaryQueues: true

# LLM Service Configuration (required)
llmService:
  generalModelName: ""
  endpoint: ""
  apiKey: ""

# Additional custom environment variables
environmentVariables: {}
# CUSTOM_VAR: "custom_value"

datadog:
  tags:

service:
  type: LoadBalancer
  port: 5001
  annotations: {}
  dns:
    enabled: false
    hostname: ""
    ttl: "300"

# When set, creates a Kubernetes Service with this name on the specified port.
# Both values are provided by the agent-deployer; direct standalone use is not supported.
gatewayDnsName: ""
gatewayPort: ""

resources:
  sam:
    requests:
      cpu: 1000m
      memory: 1024Mi
    limits:
      cpu: 2000m
      memory: 2048Mi

# Persistence configuration
# createSecrets: boolean flag controlling persistence secret creation
# - true: Chart creates persistence secret from database/s3/azure/gcs values below
# - false: Use existing secrets specified in existingSecrets section (default)
persistence:
  createSecrets: false

  objectStorage:
    workloadIdentity:
      enabled: false

  # Existing Kubernetes secrets (mode=useExistingSecrets)
  # Specify secret names that were created externally
  # This is the recommended approach for production
  existingSecrets:
    database: ""
    s3: ""
    azure: ""
    gcs: ""

  # Direct database configuration (mode=createSecret)
  # Chart will create a secret from these values
  database:
    # Full connection URL (postgresql+psycopg2://user:pass@host:port/dbname)
    url: ""
    # OR individual components (if url is empty)
    protocol: "postgresql+psycopg2"
    host: ""
    port: "5432"
    username: ""
    password: ""
    database: ""

  # Direct S3 configuration (alternative to existingSecrets.s3)
  # Only used if existingSecrets.s3 is empty
  s3:
    endpointUrl: ""
    bucketName: ""
    accessKey: ""
    secretKey: ""
    region: "us-east-1"

  azure:
    accountName: ""
    accountKey: ""
    connectionString: ""
    containerName: ""

  gcs:
    project: ""
    bucketName: ""

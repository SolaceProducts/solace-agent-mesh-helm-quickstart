{{/*
Render Secrets from config/secrets/*.tpl glob files.
Filename (without .tpl) becomes the secret name: {fullname}-{name}
*/}}
{{- range $path, $_ := .Files.Glob "config/secrets/*.tpl" }}
{{- $name := base $path | trimSuffix ".tpl" }}
{{- $content := tpl ($.Files.Get $path) $ }}
{{- if $content }}
{{- $data := $content | fromYaml }}
{{- if $data -}}
---
{{ include "sam.secret" (dict "root" $ "config" (dict "name" $name "data" $data)) }}
{{- end }}
{{- end }}
{{- end }}

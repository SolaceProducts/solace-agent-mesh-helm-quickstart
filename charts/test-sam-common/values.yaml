deployments:
  core:
    component: core
    replicaCount: 1
    rollout:
      strategy: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 1
    container:
      image:
        repository: "nginx"
        tag: "latest"
        pullPolicy: "IfNotPresent"
      ports:
        - containerPort: 80
          name: http
      env:
        - name: ENVIRONMENT
          value: "test"
      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
      probes:
        startup:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 5
          failureThreshold: 30
        readiness:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        liveness:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
    volumes:
      - name: config-volume
        configMap:
          name: test-config

  # Test: customCA disabled (no CA resources should be rendered)
  ca-disabled:
    component: ca-disabled
    customCA:
      enabled: false
    caInitImage:
      repository: nginx
      tag: latest
    container:
      image:
        repository: nginx
        tag: latest

  # Test: customCA enabled (init container, volumes, mounts, env vars all present)
  ca-enabled:
    component: ca-enabled
    customCA:
      enabled: true
    caInitImage:
      repository: nginx
      tag: latest
    container:
      image:
        repository: nginx
        tag: latest

  # Test: customCA enabled with custom configMapName
  ca-custom-configmap:
    component: ca-custom-configmap
    customCA:
      enabled: true
      configMapName: my-custom-truststore
    caInitImage:
      repository: nginx
      tag: latest
    container:
      image:
        repository: nginx
        tag: latest

service:
  component: core
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
